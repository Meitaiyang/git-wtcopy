name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: git config --global user.email "ci@example.com"
      - run: git config --global user.name "ci"
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -race
